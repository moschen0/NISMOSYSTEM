{% extends "base.html" %}

{% block title %}Registrar - WMS{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5 col-md-7 col-sm-10">
        <div class="card" style="border: none; box-shadow: 0 12px 40px rgba(0, 0, 0, 0.2); border-radius: 15px;">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="bi bi-person-plus" style="font-size: 3rem; color: #667eea;"></i>
                    <h2 class="mt-3">Criar Conta</h2>
                    <p class="text-muted">Novo usuário do sistema</p>
                </div>

                <form method="POST" action="{{ url_for('register') }}">
                    <div class="mb-3">
                        <label for="unit" class="form-label">
                            <i class="bi bi-diagram-3"></i> Unidade (Matriz/Filial)
                        </label>
                        <select class="form-select" id="unit" name="unit" required>
                            {% for unit_name in (available_units if available_units is defined else all_units) %}
                            <option value="{{ unit_name }}" {% if default_unit == unit_name %}selected{% endif %}>{{ unit_name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="username" class="form-label">
                            <i class="bi bi-person"></i> Usuário
                        </label>
                        <input type="text" class="form-control" id="username" name="username" placeholder="Mínimo 3 caracteres" required>
                        <small class="form-text text-muted">Apenas letras, números, hífen e underscore</small>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">
                            <i class="bi bi-lock"></i> Senha
                        </label>
                        <input type="password" class="form-control" id="password" name="password" placeholder="Mínimo 4 caracteres" required>
                    </div>

                    <div class="mb-3">
                        <label for="password_confirm" class="form-label">
                            <i class="bi bi-check-circle"></i> Confirmar Senha
                        </label>
                        <input type="password" class="form-control" id="password_confirm" name="password_confirm" placeholder="Repita a senha" required>
                    </div>

                    <div class="mb-4">
                        <label for="sector" class="form-label">
                            <i class="bi bi-building"></i> Setor (Opcional)
                        </label>
                        <select class="form-select" id="sector" name="sector">
                            <option value="TI" selected>Geral</option>
                            <option value="GERENCIA">Financeiro</option>
                            <option value="TRATAMENTO ANTIREFLEXO">Operacional</option>
                            <option value="VTA">Gerência</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 mb-3">
                        <i class="bi bi-person-check"></i> Registrar
                    </button>
                </form>

                <hr>

                <p class="text-center text-muted small">
                    Já tem uma conta? <a href="{{ url_for('login') }}" class="text-decoration-none">Faça login aqui</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
