{% extends "base.html" %}

{% block title %}Login - WMS{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5 col-md-7 col-sm-10">
        <div class="card" style="border: none; box-shadow: 0 12px 40px rgb(255, 166, 0); border-radius: 15px;">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <img src="{{ url_for('static', filename='img/Master_Logo_1.png') }}" alt="Logo da Empresa" height="80" class="mb-3" style="object-fit: contain;">
                    <h2 class="mt-3 mb-0">WMS</h2>
                    <p class="text-muted">Warehouse Management System</p>
                </div>

                <form method="POST" action="{{ url_for('login') }}">
                    <div class="mb-3">
                        <label for="unit" class="form-label">
                            <i class="bi bi-diagram-3"></i> Unidade (Matriz/Filial)
                        </label>
                        <select class="form-select" id="unit" name="unit" required>
                            {% for unit_name in (available_units if available_units is defined else all_units) %}
                            <option value="{{ unit_name }}" {% if (selected_unit or default_unit) == unit_name %}selected{% endif %}>{{ unit_name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="username" class="form-label">
                            <i class="bi bi-person"></i> Usuário
                        </label>
                        <input type="text" class="form-control" id="username" name="username" placeholder="Digite seu usuário" required autofocus>
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label">
                            <i class="bi bi-lock"></i> Senha
                        </label>
                        <input type="password" class="form-control" id="password" name="password" placeholder="Digite sua senha" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 mb-3">
                        <i class="bi bi-box-arrow-in-right"></i> Entrar
                    </button>
                </form>

                <hr>

                <p class="text-center text-muted small">
                    Não tem uma conta? <a href="{{ url_for('register') }}" class="text-decoration-none">Registre-se aqui</a>
                </p>

                <a href="{{ url_for('about') }}" class="btn btn-outline-secondary w-100">
                    <i class="bi bi-info-circle"></i> Ajuda e Informações
                </a>
            </div>
        </div>

        <p class="text-center text-white mt-4 small">
            <i class="bi bi-shield-lock"></i> Sistema seguro - Seus dados estão protegidos
        </p>
    </div>
</div>
{% endblock %}
