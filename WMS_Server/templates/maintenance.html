<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sistema em Manutenção - WMS</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e0e0e0;
        }
        .card {
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 16px;
            padding: 56px 48px;
            text-align: center;
            max-width: 520px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        .icon {
            font-size: 4.5rem;
            margin-bottom: 20px;
            animation: spin 4s linear infinite;
            display: inline-block;
        }
        @keyframes spin {
            0%   { transform: rotate(0deg); }
            25%  { transform: rotate(20deg); }
            75%  { transform: rotate(-20deg); }
            100% { transform: rotate(0deg); }
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #ffd700;
            margin: 0 0 12px;
        }
        .msg {
            font-size: 1.1rem;
            color: #b0bec5;
            margin-bottom: 28px;
            line-height: 1.6;
        }
        .timer-box {
            background: rgba(255,215,0,0.1);
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 10px;
            padding: 16px 24px;
            margin-bottom: 28px;
        }
        .timer-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #90a4ae;
            margin-bottom: 6px;
        }
        .timer-value {
            font-size: 2.2rem;
            font-weight: 700;
            color: #ffd700;
            font-variant-numeric: tabular-nums;
            letter-spacing: 2px;
        }
        .timer-value.expired {
            color: #4caf50;
        }
        .hint {
            font-size: 0.82rem;
            color: #607d8b;
            margin-top: 20px;
        }
        .dot {
            display: inline-block;
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #ffd700;
            animation: pulse 1.4s ease-in-out infinite;
            margin: 0 3px;
        }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse {
            0%, 80%, 100% { opacity: 0.3; transform: scale(0.85); }
            40%            { opacity: 1;   transform: scale(1.15); }
        }
    </style>
</head>
<body>
<div class="card">
    <div class="icon">🔧</div>
    <h1>Sistema em Manutenção</h1>
    <p class="msg">{{ message }}</p>

    {% if until_iso %}
    <div class="timer-box">
        <div class="timer-label">Previsão de retorno em</div>
        <div class="timer-value" id="countdown">--:--</div>
    </div>
    {% endif %}

    <div>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
    </div>

    <p class="hint">A página será recarregada automaticamente quando o sistema retornar.</p>
</div>

<script>
const untilIso = {{ until_iso | tojson }};
const maintenanceStatusUrl = {{ url_for('maintenance_status') | tojson }};

function pad(n) { return String(n).padStart(2, '0'); }

function updateCountdown() {
    const el = document.getElementById('countdown');
    if (!el || !untilIso) return;

    const until = new Date(untilIso);
    const diff  = Math.max(0, Math.floor((until - Date.now()) / 1000));

    if (diff <= 0) {
        el.textContent = '00:00';
        el.classList.add('expired');
        // Tenta recarregar a cada 5s até o servidor voltar
        setTimeout(() => location.reload(), 5000);
        return;
    }

    const m = Math.floor(diff / 60);
    const s = diff % 60;
    el.textContent = pad(m) + ':' + pad(s);
    setTimeout(updateCountdown, 1000);
}

updateCountdown();

// Polling de disponibilidade: a cada 10s verifica o status real da manutenção
setInterval(function () {
    fetch(maintenanceStatusUrl, { cache: 'no-store', headers: { 'X-Requested-With': 'XMLHttpRequest' } })
        .then(r => r.ok ? r.json() : null)
        .then(data => { if (data && !data.active) location.reload(); })
        .catch(() => {});
}, 10000);
</script>
</body>
</html>
