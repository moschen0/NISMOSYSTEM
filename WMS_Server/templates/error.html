{% extends "base.html" %}

{% block title %}{{ title }} - WMS{% endblock %}

{% block content %}
<div class="row">
    <div class="col-lg-6 mx-auto">
        <div class="card" style="border-left: 5px solid #eb3349; text-align: center;">
            <div class="card-body py-5">
                <h1 style="font-size: 4rem; color: #eb3349; margin-bottom: 20px;">
                    <i class="bi bi-exclamation-triangle"></i>
                </h1>
                <h2>{{ title }}</h2>
                <p class="text-muted lead mt-3">{{ message }}</p>
                
                <div class="mt-4">
                    <a href="{{ url_for('dashboard') }}" class="btn btn-primary btn-lg">
                        <i class="bi bi-house"></i> Voltar ao Dashboard
                    </a>
                    <a href="{{ url_for('login') }}" class="btn btn-secondary btn-lg">
                        <i class="bi bi-box-arrow-in-left"></i> Ir para Login
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
