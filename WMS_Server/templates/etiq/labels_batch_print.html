<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Etiquetas em Lote</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='etiq/styles.css') }}">
</head>
<body class="print-page">
  <main class="batch-area">
    {% for label in labels %}
    <section class="label-card">
      <h1>ETIQUETA DE CLIENTE</h1>

      <div class="row">
        <span>Cliente</span>
        <strong>{{ label.numero_cliente }}</strong>
      </div>

      <div class="row">
        <span>Data de impressao</span>
        <strong>{{ label.data_impressao }}</strong>
      </div>

      <div class="row">
        <span>Cor do roteiro</span>
        <strong>{{ label.cor_roteiro }}</strong>
      </div>

      <div class="row">
        <span>Horario do roteiro</span>
        <strong>{{ label.horario_roteiro }}</strong>
      </div>
    </section>
    {% endfor %}

    <button class="print-button" onclick="window.print()">Imprimir lote</button>
  </main>
</body>
</html>
