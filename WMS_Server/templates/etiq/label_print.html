<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Etiqueta Cliente {{ label.numero_cliente }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='etiq/styles.css') }}">
  <style>@page { size: {% if label_size == '50x30' %}50mm 30mm{% else %}80mm 20mm{% endif %}; margin: 0; }</style>
</head>
<body class="print-page{% if label_size == '50x30' %} print-50x30{% endif %}">
  <main class="print-sheet">
    {% set barcode_id = 'os-barcode-print' %}
    {% include 'etiq/label_strip_fragment.html' with context %}
  </main>

  <button class="print-button" onclick="window.print()">Imprimir</button>

  {% if label.os_id is defined %}
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
  {% endif %}
  <script>
    const STORAGE_KEYS = ["etiquetas:label-layout:v2", "etiquetas:label-layout:v1"];
    const SERVER_LAYOUT_URL = "/etiq/etiquetas/layout";
    const BARCODE_TYPE = "{{ barcode_type }}";
    const AUTO_PRINT = {{ 'true' if auto_print else 'false' }};

    async function applySavedLabelLayout(root = document) {
      let cfg = null;
      try {
        const res = await fetch(SERVER_LAYOUT_URL);
        cfg = await res.json();
      } catch (_) {
        const raw = STORAGE_KEYS.map((key) => localStorage.getItem(key)).find(Boolean);
        if (raw) {
          try {
            cfg = JSON.parse(raw);
          } catch (_) {
            cfg = null;
          }
        }
      }

      if (!cfg || !Object.keys(cfg).length) {
        return;
      }

      try {
        const labels = root.querySelectorAll(".strip-label");
        const hideChip = Boolean(cfg.hide_chip ?? cfg.hideChip);
        labels.forEach(labelEl => {
          labelEl.style.setProperty("--top-x", `${Number(cfg.topX ?? 0)}mm`);
          labelEl.style.setProperty("--top-y", `${Number(cfg.topY ?? 0)}mm`);
          labelEl.style.setProperty("--top-scale", String(Number(cfg.topSize ?? 1)));
          labelEl.style.setProperty("--meta-x", `${Number(cfg.metaX ?? 0)}mm`);
          labelEl.style.setProperty("--meta-y", `${Number(cfg.metaY ?? 0)}mm`);
          labelEl.style.setProperty("--meta-scale", String(Number(cfg.metaSize ?? 1)));
          labelEl.style.setProperty("--chip-x", `${Number(cfg.chipX ?? 0)}mm`);
          labelEl.style.setProperty("--chip-y", `${Number(cfg.chipY ?? 0)}mm`);
          labelEl.style.setProperty("--chip-scale", String(Number(cfg.chipSize ?? 1)));
          labelEl.style.setProperty("--barcode-x", `${Number(cfg.barcodeX ?? 0)}mm`);
          labelEl.style.setProperty("--barcode-y", `${Number(cfg.barcodeY ?? 0)}mm`);
          labelEl.style.setProperty("--barcode-scale", String(Number(cfg.barcodeSize ?? 1)));

          labelEl.classList.toggle("hide-top", Boolean(cfg.hideTop));
          labelEl.classList.toggle("hide-meta", Boolean(cfg.hideMeta));
          labelEl.classList.toggle("hide-chip", hideChip);
          labelEl.classList.toggle("hide-barcode", Boolean(cfg.hideBarcode));
        });
      } catch (_) {
        // Ignore invalid saved config and keep default layout.
      }
    }

    function triggerBrowserPrint() {
      if (!AUTO_PRINT) {
        return;
      }

      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          window.print();
        });
      });
    }

    {% if label.os_id is defined %}
    (function() {
      const fmt = BARCODE_TYPE || "CODE128";
      const val = "{{ label.os_id }}";
      const svgEl = document.getElementById("os-barcode-print");
      const imgEl = document.getElementById("os-barcode-print-qr");
      if (fmt === "QRCODE") {
        if (svgEl) svgEl.style.display = "none";
        QRCode.toDataURL(val, { width: 256, margin: 1 }, function(err, url) {
          if (!err && imgEl) { imgEl.src = url; imgEl.style.display = ""; }
        });
      } else {
        JsBarcode("#os-barcode-print", val, {
          format: fmt,
          displayValue: false,
          margin: 0,
          height: 36,
          width: 1
        });
      }
    })();
    {% endif %}

    applySavedLabelLayout().then(triggerBrowserPrint);
  </script>
</body>
</html>
