{% extends "base.html" %}

{% block content %}
<div class="container-fluid mt-5">
  <div class="row">
    <!-- Filtros -->
    <div class="col-lg-3">
      <div class="card shadow-sm mb-4">
        <div class="card-header bg-primary text-white">
          <h6 class="mb-0"><i class="bi bi-funnel"></i> Filtros</h6>
        </div>
        <div class="card-body">
          <form id="form-filtros" onsubmit="return AdminConfirmations.aplicarFiltros()">
            <div class="mb-3">
              <label class="form-label small">Data Inicial</label>
              <input type="date" class="form-control form-control-sm" id="filter-date-from">
            </div>

            <div class="mb-3">
              <label class="form-label small">Data Final</label>
              <input type="date" class="form-control form-control-sm" id="filter-date-to">
            </div>

            <div class="mb-3">
              <label class="form-label small">Usuário</label>
              <select class="form-select form-select-sm" id="filter-username">
                <option value="">Todos</option>
                {% for username in usernames %}
                <option value="{{ username }}">{{ username }}</option>
                {% endfor %}
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label small">Setor</label>
              <select class="form-select form-select-sm" id="filter-sector">
                <option value="">Todos</option>
                {% for sector in sectors %}
                <option value="{{ sector }}">{{ sector }}</option>
                {% endfor %}
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label small">Resultado</label>
              <select class="form-select form-select-sm" id="filter-result">
                <option value="">Todos</option>
                <option value="ok">Conferidas OK</option>
                <option value="error">Divergentes</option>
              </select>
            </div>

            <div class="d-grid gap-2">
              <button type="submit" class="btn btn-primary btn-sm">
                <i class="bi bi-search"></i> Filtrar
              </button>
              <button type="button" class="btn btn-secondary btn-sm" onclick="AdminConfirmations.limparFiltros()">
                <i class="bi bi-arrow-clockwise"></i> Limpar
              </button>
              <button type="button" class="btn btn-success btn-sm" onclick="AdminConfirmations.exportarFiltrado()">
                <i class="bi bi-download"></i> Baixar XLSX
              </button>
            </div>
          </form>
        </div>
      </div>

      <!-- Card de Estatísticas Rápidas -->
      <div class="card shadow-sm">
        <div class="card-header bg-success text-white">
          <h6 class="mb-0"><i class="bi bi-bar-chart"></i> Resumo</h6>
        </div>
        <div class="card-body">
          <div class="mb-3">
            <div class="small text-muted">Total Conferências</div>
            <div class="h4 mb-0" id="stat-total">0</div>
          </div>
          <div class="mb-3">
            <div class="small text-muted">Conferidas OK</div>
            <div class="h4 mb-0 text-success" id="stat-ok">0</div>
          </div>
          <div class="mb-3">
            <div class="small text-muted">Divergentes</div>
            <div class="h4 mb-0 text-danger" id="stat-error">0</div>
          </div>
          <div class="border-top pt-3">
            <div class="small text-muted">Taxa de Acerto</div>
            <div class="h5 mb-0" id="stat-accuracy">0%</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Tabela Principal -->
    <div class="col-lg-9">
      <div class="card shadow-sm">
        <div class="card-header d-flex justify-content-between align-items-center">
          <h6 class="mb-0"><i class="bi bi-table"></i> Confirmações de OS</h6>
          <span class="badge bg-info" id="count-registros">0 registros</span>
        </div>
        <div class="table-responsive">
          <table class="table table-hover mb-0">
            <thead class="table-light">
              <tr>
                <th style="width: 5%">#</th>
                <th style="width: 15%">Usuário</th>
                <th style="width: 12%">Setor</th>
                <th style="width: 15%">OS Referência</th>
                <th style="width: 15%">OS Confirmação</th>
                <th style="width: 12%">Data/Hora</th>
                <th style="width: 10%">Resultado</th>
              </tr>
            </thead>
            <tbody id="table-body">
              <tr>
                <td colspan="7" class="text-center text-muted py-4">
                  <i class="bi bi-inbox"></i> Carregando dados...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
        <div class="card-footer text-muted small">
          Última atualização: <span id="timestamp-update">agora</span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Estilos Customizados -->
<style>
  .table-hover tbody tr:hover {
    background-color: #f8f9fa;
  }

  .badge-resultado {
    padding: 8px 12px;
    border-radius: 20px;
    font-size: 0.85rem;
    font-weight: 600;
  }

  .badge-ok {
    background-color: #d1fae5;
    color: #065f46;
  }

  .badge-erro {
    background-color: #fee2e2;
    color: #991b1b;
  }

  .os-cell {
    font-family: 'Courier New', monospace;
    font-weight: 600;
  }
</style>

<!-- Scripts -->
<script>
  const AdminConfirmations = (() => {
    // Carrega dados iniciais
    function init() {
      carregarDados();
      // Recarrega a cada 30 segundos
      setInterval(carregarDados, 30000);
    }

    function carregarDados() {
      const filters = obterFiltros();
      const params = new URLSearchParams();

      if (filters.date_from) params.append('date_from', filters.date_from);
      if (filters.date_to) params.append('date_to', filters.date_to);
      if (filters.username) params.append('username', filters.username);
      if (filters.sector) params.append('sector', filters.sector);
      if (filters.result && filters.result !== '') params.append('result', filters.result);

      fetch(`/api/confirmations/all?${params.toString()}`)
        .then(response => response.json())
        .then(data => {
          if (data.success) {
            renderizarTabela(data.confirmations);
            atualizarStats(data.stats);
          }
        })
        .catch(error => console.error('Erro ao carregar dados:', error));
    }

    function renderizarTabela(confirmations) {
      const tbody = document.getElementById('table-body');
      const countSpan = document.getElementById('count-registros');

      if (!confirmations || confirmations.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="7" class="text-center text-muted py-4">
              <i class="bi bi-inbox"></i> Nenhum registro encontrado
            </td>
          </tr>
        `;
        countSpan.textContent = '0 registros';
        return;
      }

      tbody.innerHTML = confirmations.map((conf, i) => `
        <tr>
          <td class="small">${i + 1}</td>
          <td><strong>${conf.username}</strong></td>
          <td><span class="badge bg-secondary">${conf.sector}</span></td>
          <td class="os-cell">${conf.os_reference}</td>
          <td class="os-cell">${conf.os_confirmation}</td>
          <td class="small">${conf.data}<br><small class="text-muted">${conf.hora}</small></td>
          <td>
            <span class="badge-resultado ${conf.result === 'ok' ? 'badge-ok' : 'badge-erro'}">
              ${conf.result === 'ok' ? 'OK' : 'Divergente'}
            </span>
          </td>
        </tr>
      `).join('');

      countSpan.textContent = confirmations.length + ' registro' + (confirmations.length !== 1 ? 's' : '');

      // Atualiza timestamp
      const now = new Date();
      document.getElementById('timestamp-update').textContent = 
        now.toLocaleTimeString('pt-BR');
    }

    function atualizarStats(stats) {
      document.getElementById('stat-total').textContent = stats.total;
      document.getElementById('stat-ok').textContent = stats.ok;
      document.getElementById('stat-error').textContent = stats.error;
      document.getElementById('stat-accuracy').textContent = 
        stats.accuracy_percent.toFixed(1) + '%';
    }

    function obterFiltros() {
      return {
        date_from: document.getElementById('filter-date-from').value,
        date_to: document.getElementById('filter-date-to').value,
        username: document.getElementById('filter-username').value,
        sector: document.getElementById('filter-sector').value,
        result: document.getElementById('filter-result').value,
      };
    }

    function aplicarFiltros() {
      carregarDados();
      return false;
    }

    function limparFiltros() {
      document.getElementById('filter-date-from').value = '';
      document.getElementById('filter-date-to').value = '';
      document.getElementById('filter-username').value = '';
      document.getElementById('filter-sector').value = '';
      document.getElementById('filter-result').value = '';
      carregarDados();
    }

    function exportarFiltrado() {
      const filters = obterFiltros();
      fetch('/api/confirmations/export', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(filters),
      })
      .then(response => {
        if (!response.ok) {
          return response.json().then(data => {
            throw new Error(data.error || 'Erro ao exportar');
          });
        }
        return response.blob().then(blob => {
          const url = window.URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `confirmacoes_os_${new Date().toISOString().slice(0,10)}.xlsx`;
          document.body.appendChild(a);
          a.click();
          window.URL.revokeObjectURL(url);
          document.body.removeChild(a);
        });
      })
      .catch(error => {
        console.error('Erro ao exportar:', error);
        alert('Erro ao exportar dados: ' + error.message);
      });
    }

    return {
      init: init,
      carregarDados: carregarDados,
      aplicarFiltros: aplicarFiltros,
      limparFiltros: limparFiltros,
      exportarFiltrado: exportarFiltrado,
    };
  })();

  // Inicializa ao carregar
  document.addEventListener('DOMContentLoaded', function() {
    AdminConfirmations.init();
  });
</script>
{% endblock %}
